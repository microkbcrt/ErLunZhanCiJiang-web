name: Build Pure HTML Version

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Get version from tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Create dist directory
        run: mkdir -p dist

      - name: Process HTML for browser
        run: |
          # 复制 index.html 到 dist 目录
          cp src/index.html dist/index.html
          
          # 【修正】使用 | 作为分隔符，避免与 / 冲突
          sed -i 's|<script src="cordova.js"></script>||g' dist/index.html
          
          # 更新版本号
          sed -i "s|版本：[0-9.]\+|版本：${{ steps.get_version.outputs.VERSION }}|g" dist/index.html
          
          # 复制字体文件
          mkdir -p dist/fonts
          if [ -d "src/fonts" ]; then
            cp -r src/fonts/* dist/fonts/
          fi
          
          # 复制图标
          if [ -f "src/icon.png" ]; then
            cp src/icon.png dist/
          fi

      - name: Create PWA manifest
        run: |
          cat > dist/manifest.json << 'EOF'
          {
            "name": "二轮斩词酱",
            "short_name": "斩词酱",
            "description": "以互动的方式快速背完二轮 1500 单词",
            "start_url": "/index.html",
            "display": "standalone",
            "background_color": "#fef7ff",
            "theme_color": "#3f51b5",
            "icons": [
              {
                "src": "icon.png",
                "sizes": "512x512",
                "type": "image/png"
              }
            ]
          }
          EOF

      - name: Create service worker
        run: |
          cat > dist/sw.js << 'EOF'
          const CACHE_NAME = 'wordcards-v1';
          const ASSETS = [
            '/',
            '/index.html',
            '/manifest.json',
            '/icon.png',
            '/fonts/noto-sans-sc-v38-chinese-simplified-regular.woff2',
            '/fonts/noto-sans-sc-v38-chinese-simplified-500.woff2',
            '/fonts/noto-sans-sc-v38-chinese-simplified-700.woff2',
            '/fonts/roboto-v48-latin-regular.woff2',
            '/fonts/roboto-v48-latin-500.woff2',
            '/fonts/roboto-v48-latin-700.woff2'
          ];

          self.addEventListener('install', (e) => {
            e.waitUntil(
              caches.open(CACHE_NAME).then((cache) => cache.addAll(ASSETS))
            );
          });

          self.addEventListener('fetch', (e) => {
            e.respondWith(
              caches.match(e.request).then((response) => response || fetch(e.request))
            );
          });
          EOF

      - name: Add PWA links to HTML
        run: |
          # 【修正】使用 | 作为分隔符
          sed -i 's|</head>|<link rel="manifest" href="/manifest.json">\n<meta name="theme-color" content="#3f51b5">\n<script>if("serviceWorker" in navigator){navigator.serviceWorker.register("/sw.js")}</script></head>|g' dist/index.html

      - name: Create README
        run: |
          cat > dist/README.md << EOF
          # 二轮斩词酱 - 浏览器版本

          ## 使用方法
          1. 直接打开 index.html 文件
          2. 或部署到任何静态网站托管服务

          ## 功能说明
          - ✅ 单词学习、复习、测试
          - ✅ 错题本管理
          - ✅ 学习进度统计
          - ✅ 数据导出/导入
          - ✅ 深色/浅色主题
          - ⚠️ 语音朗读需要浏览器支持
          - ⚠️ 更新检测需要网络连接

          ## 版本
          ${{ steps.get_version.outputs.VERSION }}

          ## 构建时间
          $(date -u +"%Y-%m-%d %H:%M:%S UTC")
          EOF

      - name: Create ZIP archive
        run: |
          cd dist
          zip -r ../gaokao-zhancijiang-browser-${{ steps.get_version.outputs.VERSION }}.zip .
          cd ..

      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            gaokao-zhancijiang-browser-${{ steps.get_version.outputs.VERSION }}.zip
          generate_release_notes: true
          make_latest: true

      - name: Setup Pages
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      - name: Deploy to GitHub Pages
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/deploy-pages@v4

  notify:
    needs: build
    runs-on: ubuntu-latest
    if: always()
    
    steps:
      - name: Build Status
        run: |
          if [ "${{ needs.build.result }}" == "success" ]; then
            echo "✅ 构建成功！"
            echo "📦 下载链接：https://github.com/${{ github.repository }}/releases"
            echo "🌐 在线访问：https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/"
          else
            echo "❌ 构建失败，请检查日志"
            exit 1
          fi
