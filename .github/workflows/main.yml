name: Build Pure HTML Version

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (如 1.4.0)'
        required: true
        default: '1.4.0'

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Get version
        id: get_version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION=${GITHUB_REF#refs/tags/v}
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION=${{ github.event.inputs.version }}
          else
            VERSION="dev-$(date +%Y%m%d)"
          fi
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Generated version: $VERSION"

      - name: Create dist directory
        run: mkdir -p dist

      - name: Process HTML with Node.js
        run: |
          node << 'NODESCRIPT'
          const fs = require('fs');
          
          // 读取源文件
          let html = fs.readFileSync('src/index.html', 'utf8');
          
          // 1. 移除 cordova.js 引用
          html = html.replace(/<script src="cordova\.js"><\/script>/g, '');
          console.log('✓ 已移除 cordova.js');
          
          // 2. 更新版本号
          html = html.replace(/版本：[\d.]+/g, `版本：${process.env.VERSION}`);
          console.log(`✓ 已更新版本号：${process.env.VERSION}`);
          
          // 3. 添加 PWA 链接（在</head>之前）
          const pwaCode = `<link rel="manifest" href="/manifest.json">
          <meta name="theme-color" content="#3f51b5">
          <script>if("serviceWorker" in navigator){navigator.serviceWorker.register("/sw.js")}</script>`;
          html = html.replace('</head>', pwaCode + '\n</head>');
          console.log('✓ 已添加 PWA 支持');
          
          // 4. 修改 checkForUpdates 函数，使其在浏览器环境也能工作
          html = html.replace(
            /if \(!window\.cordova \|\| !window\.cordova\.getAppVersion\) \{[\s\S]*?return;[\s\S]*?\}/,
            `// 浏览器环境也检查更新
            // const currentVersion = await cordova.getAppVersion.getVersionNumber();
            const currentVersion = '${process.env.VERSION}';`
          );
          console.log('✓ 已修改更新检测逻辑');
          
          // 写入目标文件
          fs.writeFileSync('dist/index.html', html);
          console.log('✅ HTML 处理完成');
          NODESCRIPT
        env:
          VERSION: ${{ steps.get_version.outputs.VERSION }}

      - name: Copy fonts
        run: |
          mkdir -p dist/fonts
          if [ -d "src/fonts" ]; then
            cp -r src/fonts/* dist/fonts/ 2>/dev/null || echo "No fonts to copy"
          fi

      - name: Copy icon
        run: |
          if [ -f "src/icon.png" ]; then
            cp src/icon.png dist/
          fi

      - name: Create PWA manifest
        run: |
          cat > dist/manifest.json << 'EOF'
          {
            "name": "高考斩词酱",
            "short_name": "斩词酱",
            "description": "以互动的方式快速背完 3500 考纲",
            "start_url": "/index.html",
            "display": "standalone",
            "background_color": "#fef7ff",
            "theme_color": "#3f51b5",
            "icons": [
              {
                "src": "icon.png",
                "sizes": "512x512",
                "type": "image/png"
              }
            ]
          }
          EOF

      - name: Create service worker
        run: |
          cat > dist/sw.js << 'EOF'
          const CACHE_NAME = 'wordcards-v1';
          const ASSETS = [
            '/',
            '/index.html',
            '/manifest.json',
            '/icon.png'
          ];

          self.addEventListener('install', (e) => {
            e.waitUntil(
              caches.open(CACHE_NAME).then((cache) => cache.addAll(ASSETS))
            );
          });

          self.addEventListener('fetch', (e) => {
            e.respondWith(
              caches.match(e.request).then((response) => response || fetch(e.request))
            );
          });
          EOF

      - name: Create README
        run: |
          cat > dist/README.md << EOF
          # 高考斩词酱 - 浏览器版本

          ## 使用方法
          1. 直接打开 index.html 文件
          2. 或部署到任何静态网站托管服务

          ## 功能说明
          - ✅ 单词学习、复习、测试
          - ✅ 错题本管理
          - ✅ 学习进度统计
          - ✅ 数据导出/导入
          - ✅ 深色/浅色主题
          - ⚠️ 语音朗读使用 Web Speech API
          - ⚠️ 更新检测需要网络连接

          ## 版本
          ${{ steps.get_version.outputs.VERSION }}

          ## 构建时间
          $(date -u +"%Y-%m-%d %H:%M:%S UTC")
          EOF

      - name: Create ZIP archive
        run: |
          zip -r gaokao-zhancijiang-browser-${{ steps.get_version.outputs.VERSION }}.zip dist/
          ls -la *.zip

      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            gaokao-zhancijiang-browser-${{ steps.get_version.outputs.VERSION }}.zip
          generate_release_notes: true
          make_latest: true

      - name: Setup Pages
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      - name: Deploy to GitHub Pages
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/deploy-pages@v4

      - name: Upload ZIP as artifact (always)
        uses: actions/upload-artifact@v4
        with:
          name: gaokao-zhancijiang-browser-${{ steps.get_version.outputs.VERSION }}
          path: gaokao-zhancijiang-browser-${{ steps.get_version.outputs.VERSION }}.zip
          retention-days: 30

      - name: Build Summary
        run: |
          echo "## ✅ 构建完成" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**版本:** ${{ steps.get_version.outputs.VERSION }}" >> $GITHUB_STEP_SUMMARY
          echo "**时间:** $(date -u +"%Y-%m-%d %H:%M:%S UTC")" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [[ "${{ startsWith(github.ref, 'refs/tags/') }}" == "true" ]]; then
            echo "📦 Release: https://github.com/${{ github.repository }}/releases" >> $GITHUB_STEP_SUMMARY
            echo "🌐 Pages: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/" >> $GITHUB_STEP_SUMMARY
          else
            echo "📦 下载：查看上方 Artifacts" >> $GITHUB_STEP_SUMMARY
          fi
